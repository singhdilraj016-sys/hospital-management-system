<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - MediCare HMS</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#8e44ad);
min-height:100vh;
color:white;
overflow-x:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
position:fixed;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px 20px;
border-right:1px solid rgba(255,255,255,0.2);
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo i{
font-size:50px;
}

.logo h2{
margin-top:10px;
font-weight:700;
}

.menu{
list-style:none;
padding:0;
}

.menu li{
margin:18px 0;
}

.menu a{
text-decoration:none;
color:white;
display:flex;
align-items:center;
gap:15px;
padding:14px 18px;
border-radius:12px;
transition:0.3s;
font-weight:500;
}

.menu a:hover,
.active{
background:rgba(255,255,255,0.2);
transform:translateX(5px);
}

/* MAIN CONTENT */

.main-content{
margin-left:260px;
padding:30px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.top-bar h1{
font-weight:700;
}

.logout-btn{
background:#ff4757;
border:none;
padding:12px 20px;
border-radius:12px;
color:white;
font-weight:600;
}

.logout-btn:hover{
background:#e84118;
}

/* DASHBOARD CARDS */

.card-box{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);
padding:30px;
border-radius:25px;
box-shadow:0 8px 32px rgba(0,0,0,0.15);
transition:0.3s;
}

.card-box:hover{
transform:translateY(-5px);
}

.card-icon{
font-size:45px;
margin-bottom:20px;
}

.card-box h2{
font-size:40px;
font-weight:700;
}

.card-box p{
font-size:18px;
opacity:0.9;
}

/* QUICK ACTIONS */

.quick-actions{
margin-top:40px;
}

.action-btn{
width:100%;
padding:18px;
border:none;
border-radius:18px;
font-weight:600;
font-size:17px;
background:white;
color:#6c5ce7;
transition:0.3s;
}

.action-btn:hover{
background:#6c5ce7;
color:white;
}

</style>

</head>

<body>

<!-- LOGIN PROTECTION -->

<script>

if(localStorage.getItem("isLoggedIn") !== "true"){

window.location.href = "login.html";

}

</script>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-hospital"></i>
<h2>MediCare</h2>
</div>

<ul class="menu">

<li>
<a href="dashboard.html" class="active">
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</a>
</li>

<li>
<a href="patients.html">
<i class="fa-solid fa-user-injured"></i>
<span>Patients</span>
</a>
</li>

<li>
<a href="doctors.html">
<i class="fa-solid fa-user-doctor"></i>
<span>Doctors</span>
</a>
</li>

<li>
<a href="appointments.html">
<i class="fa-solid fa-calendar-check"></i>
<span>Appointments</span>
</a>
</li>

<li>
<a href="billing.html">
<i class="fa-solid fa-money-bill-wave"></i>
<span>Billing</span>
</a>
</li>

<li>
<a href="#" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</a>
</li>

</ul>

</div>

<!-- MAIN CONTENT -->

<div class="main-content">

<div class="top-bar">

<h1>Hospital Dashboard</h1>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</div>

<!-- DASHBOARD CARDS -->

<div class="row g-4">

<div class="col-md-3">

<div class="card-box">

<div class="card-icon">
<i class="fa-solid fa-user-injured"></i>
</div>

<h2 id="patientCount">0</h2>

<p>Total Patients</p>

</div>

</div>

<div class="col-md-3">

<div class="card-box">

<div class="card-icon">
<i class="fa-solid fa-user-doctor"></i>
</div>

<h2 id="doctorCount">0</h2>

<p>Total Doctors</p>

</div>

</div>

<div class="col-md-3">

<div class="card-box">

<div class="card-icon">
<i class="fa-solid fa-calendar-check"></i>
</div>

<h2 id="appointmentCount">0</h2>

<p>Appointments</p>

</div>

</div>

<div class="col-md-3">

<div class="card-box">

<div class="card-icon">
<i class="fa-solid fa-money-bill-wave"></i>
</div>

<h2 id="billingCount">0</h2>

<p>Total Bills</p>

</div>

</div>

</div>

<!-- QUICK ACTIONS -->

<div class="quick-actions">

<h2 class="mb-4">Quick Actions</h2>

<div class="row g-4">

<div class="col-md-3">
<a href="patients.html">
<button class="action-btn">
<i class="fa-solid fa-user-plus"></i>
 Add Patient
</button>
</a>
</div>

<div class="col-md-3">
<a href="doctors.html">
<button class="action-btn">
<i class="fa-solid fa-user-doctor"></i>
 Add Doctor
</button>
</a>
</div>

<div class="col-md-3">
<a href="appointments.html">
<button class="action-btn">
<i class="fa-solid fa-calendar-plus"></i>
 Book Appointment
</button>
</a>
</div>

<div class="col-md-3">
<a href="billing.html">
<button class="action-btn">
<i class="fa-solid fa-file-invoice-dollar"></i>
 Generate Bill
</button>
</a>
</div>

</div>

</div>

</div>

<script>

/* LOGOUT FUNCTION */

function logout(){

localStorage.removeItem("isLoggedIn");

window.location.href = "login.html";

}

/* LOAD DASHBOARD DATA */

async function loadDashboard(){

/* PATIENTS */

const patientRes =
await fetch("http://localhost:5000/patients");

const patients =
await patientRes.json();

document.getElementById("patientCount").innerText =
patients.length;

/* DOCTORS */

const doctorRes =
await fetch("http://localhost:5000/doctors");

const doctors =
await doctorRes.json();

document.getElementById("doctorCount").innerText =
doctors.length;

/* APPOINTMENTS */

const appointmentRes =
await fetch("http://localhost:5000/appointments");

const appointments =
await appointmentRes.json();

document.getElementById("appointmentCount").innerText =
appointments.length;

/* BILLING */

const billingRes =
await fetch("http://localhost:5000/billing");

const bills =
await billingRes.json();

document.getElementById("billingCount").innerText =
bills.length;

}

loadDashboard();

</script>
</body>
</html>
