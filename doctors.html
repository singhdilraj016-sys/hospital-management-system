<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Doctors - MediCare HMS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background: linear-gradient(135deg,#4facfe,#8e44ad);
min-height:100vh;
color:white;
}

.sidebar{
width:260px;
height:100vh;
position:fixed;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px 20px;
border-right:1px solid rgba(255,255,255,0.2);
}

.logo{
text-align:center;
margin-bottom:40px;
}

.logo i{
font-size:50px;
}

.logo h2{
margin-top:10px;
font-weight:700;
}

.menu{
list-style:none;
padding:0;
}

.menu li{
margin:18px 0;
}

.menu a{
text-decoration:none;
color:white;
display:flex;
align-items:center;
gap:15px;
padding:14px 18px;
border-radius:12px;
transition:0.3s;
font-weight:500;
}

.menu a:hover,
.active{
background:rgba(255,255,255,0.2);
transform:translateX(5px);
}

.main-content{
margin-left:260px;
padding:30px;
}

.glass-box{
background:rgba(255,255,255,0.15);
border:1px solid rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
border-radius:25px;
padding:30px;
margin-bottom:30px;
}

.form-control{
height:50px;
border:none;
border-radius:12px;
background:rgba(255,255,255,0.2);
color:white;
margin-bottom:20px;
}

.form-control::placeholder{
color:#eee;
}

.form-control:focus{
background:rgba(255,255,255,0.25);
color:white;
box-shadow:none;
}

.btn-submit{
background:white;
color:#6c5ce7;
border:none;
padding:12px 30px;
border-radius:12px;
font-weight:600;
}

.btn-submit:hover{
background:#6c5ce7;
color:white;
}

table{
width:100%;
color:white;
}

table th,
table td{
padding:15px;
}

tr{
border-bottom:1px solid rgba(255,255,255,0.1);
}

.delete-btn{
background:#d63031;
border:none;
color:white;
padding:8px 15px;
border-radius:10px;
margin-right:5px;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">
<i class="fa-solid fa-hospital"></i>
<h2>MediCare</h2>
</div>

<ul class="menu">

<li>
<a href="dashboard.html">
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</a>
</li>

<li>
<a href="patients.html">
<i class="fa-solid fa-user-injured"></i>
<span>Patients</span>
</a>
</li>

<li>
<a href="doctors.html" class="active">
<i class="fa-solid fa-user-doctor"></i>
<span>Doctors</span>
</a>
</li>

<li>
<a href="appointments.html">
<i class="fa-solid fa-calendar-check"></i>
<span>Appointments</span>
</a>
</li>

<li>
<a href="billing.html">
<i class="fa-solid fa-money-bill-wave"></i>
<span>Billing</span>
</a>
</li>
<li>
<a href="#" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</a>
</li>

</ul>

</div>

<div class="main-content">

<div class="glass-box">

<h2>Add Doctor</h2>

<div class="row">

<div class="col-md-6">
<input type="text" id="name" class="form-control" placeholder="Doctor Name">
</div>

<div class="col-md-6">
<input type="text" id="specialization" class="form-control" placeholder="Specialization">
</div>

<div class="col-md-6">
<input type="number" id="experience" class="form-control" placeholder="Experience">
</div>

<div class="col-md-6">
<input type="text" id="phone" class="form-control" placeholder="Phone">
</div>

</div>

<button class="btn-submit" onclick="addDoctor()">
Add Doctor
</button>

</div>

<div class="glass-box">

<h2>Doctor Records</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Specialization</th>
<th>Experience</th>
<th>Phone</th>
<th>Action</th>
</tr>

</thead>

<tbody id="doctorTable"></tbody>

</table>

</div>

</div>

<script>
  function logout(){

localStorage.removeItem("isLoggedIn");

window.location.href = "login.html";

}

const API_URL = "https://hospital-management-system-2cyi.onrender.com/doctors";

async function loadDoctors(){

const response = await fetch(API_URL);

const doctors = await response.json();

const table = document.getElementById("doctorTable");

table.innerHTML = "";

doctors.forEach(doctor => {

table.innerHTML += `

<tr>

<td>${doctor.name}</td>
<td>${doctor.specialization}</td>
<td>${doctor.experience}</td>
<td>${doctor.phone}</td>

<td>

<button class="delete-btn"
onclick="editDoctor(
'${doctor._id}',
'${doctor.name}',
'${doctor.specialization}',
'${doctor.experience}',
'${doctor.phone}'
)">
Edit
</button>

<button class="delete-btn"
onclick="deleteDoctor('${doctor._id}')">
Delete
</button>

</td>

</tr>

`;

});

}

/* ADD DOCTOR */
async function addDoctor(){

const name =
document.getElementById("name").value;

const specialization =
document.getElementById("specialization").value;

const experience =
document.getElementById("experience").value;

const phone =
document.getElementById("phone").value;

await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name,
specialization,
experience,
phone

})

});

loadDoctors();

}

/* DELETE DOCTOR */
async function deleteDoctor(id){

await fetch(`${API_URL}/${id}`,{
method:"DELETE"
});

loadDoctors();

}

/* EDIT DOCTOR */
async function editDoctor(id,name,specialization,experience,phone){

const newName = prompt("Enter Name",name);

const newSpecialization =
prompt("Enter Specialization",specialization);

const newExperience =
prompt("Enter Experience",experience);

const newPhone =
prompt("Enter Phone",phone);

await fetch(`${API_URL}/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:newName,
specialization:newSpecialization,
experience:newExperience,
phone:newPhone

})

});

loadDoctors();

}

loadDoctors();

</script>

</body>
</html>
