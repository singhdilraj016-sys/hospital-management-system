<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Appointments - MediCare HMS</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background: linear-gradient(135deg,#4facfe,#8e44ad);
      min-height:100vh;
      color:white;
    }

    .sidebar{
      width:260px;
      height:100vh;
      position:fixed;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(15px);
      padding:25px 20px;
      border-right:1px solid rgba(255,255,255,0.2);
    }

    .logo{
      text-align:center;
      margin-bottom:40px;
    }

    .logo i{
      font-size:50px;
    }

    .logo h2{
      margin-top:10px;
      font-weight:700;
    }

    .menu{
      list-style:none;
      padding:0;
    }

    .menu li{
      margin:18px 0;
    }

    .menu a{
      text-decoration:none;
      color:white;
      display:flex;
      align-items:center;
      gap:15px;
      padding:14px 18px;
      border-radius:12px;
      transition:0.3s;
      font-weight:500;
    }

    .menu a:hover,
    .active{
      background:rgba(255,255,255,0.2);
      transform:translateX(5px);
    }

    .main-content{
      margin-left:260px;
      padding:30px;
    }

    .glass-box{
      background:rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(15px);
      border-radius:25px;
      padding:30px;
      margin-bottom:30px;
      box-shadow:0 8px 32px rgba(0,0,0,0.15);
    }

    .form-control{
      height:50px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,0.2);
      color:white;
      margin-bottom:20px;
    }

    .form-control::placeholder{
      color:#eee;
    }

    .form-control:focus{
      background:rgba(255,255,255,0.25);
      color:white;
      box-shadow:none;
    }

    .btn-submit{
      background:white;
      color:#6c5ce7;
      border:none;
      padding:12px 30px;
      border-radius:12px;
      font-weight:600;
    }

    .btn-submit:hover{
      background:#6c5ce7;
      color:white;
    }

    table{
      width:100%;
      color:white;
    }

    table th,
    table td{
      padding:15px;
    }

    tr{
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    .delete-btn{
      background:#d63031;
      border:none;
      color:white;
      padding:8px 15px;
      border-radius:10px;
    }

  </style>
</head>

<body>

<div class="sidebar">

  <div class="logo">
    <i class="fa-solid fa-hospital"></i>
    <h2>MediCare</h2>
  </div>

  <ul class="menu">

    <li>
      <a href="dashboard.html">
        <i class="fa-solid fa-chart-line"></i>
        <span>Dashboard</span>
      </a>
    </li>

    <li>
      <a href="patients.html">
        <i class="fa-solid fa-user-injured"></i>
        <span>Patients</span>
      </a>
    </li>

    <li>
      <a href="doctors.html">
        <i class="fa-solid fa-user-doctor"></i>
        <span>Doctors</span>
      </a>
    </li>

    <li>
      <a href="appointments.html" class="active">
        <i class="fa-solid fa-calendar-check"></i>
        <span>Appointments</span>
      </a>
    </li>
    <li>
<a href="#" onclick="logout()">
<i class="fa-solid fa-right-from-bracket"></i>
<span>Logout</span>
</a>
</li>

  </ul>

</div>

<div class="main-content">

  <div class="glass-box">

    <h2>Book Appointment</h2>

    <div class="row">

      <div class="col-md-6">
        <input type="text" id="patientName" class="form-control" placeholder="Patient Name">
      </div>

      <div class="col-md-6">
        <input type="text" id="doctorName" class="form-control" placeholder="Doctor Name">
      </div>

      <div class="col-md-6">
        <input type="date" id="appointmentDate" class="form-control">
      </div>

      <div class="col-md-6">
        <input type="text" id="disease" class="form-control" placeholder="Disease">
      </div>

    </div>

    <button class="btn-submit" onclick="addAppointment()">
      Book Appointment
    </button>

  </div>

  <div class="glass-box">

    <h2>Appointment Records</h2>

    <table>

      <thead>

        <tr>
          <th>ID</th>
          <th>Patient</th>
          <th>Doctor</th>
          <th>Date</th>
          <th>Disease</th>
          <th>Action</th>
        </tr>

      </thead>

      <tbody id="appointmentTable"></tbody>

    </table>

  </div>

</div>

<script>
    function logout(){

localStorage.removeItem("isLoggedIn");

window.location.href = "login.html";

}

const API_URL = "http://localhost:5000/appointments";

/* LOAD APPOINTMENTS */
async function loadAppointments(){

    const response = await fetch(API_URL);

    const appointments = await response.json();

    const table = document.getElementById("appointmentTable");

    table.innerHTML = "";

    appointments.forEach(appointment => {

        table.innerHTML += `

        <tr>

            <td>${appointment._id}</td>
            <td>${appointment.patientName}</td>
            <td>${appointment.doctorName}</td>
            <td>${appointment.appointmentDate}</td>
            <td>${appointment.disease}</td>

            <td>
                <button class="delete-btn"
                    onclick="deleteAppointment('${appointment._id}')">
                    Delete
                </button>
            </td>

        </tr>

        `;
    });

}

/* ADD APPOINTMENT */
async function addAppointment(){

    const patientName = document.getElementById("patientName").value;
    const doctorName = document.getElementById("doctorName").value;
    const appointmentDate = document.getElementById("appointmentDate").value;
    const disease = document.getElementById("disease").value;

    if(!patientName || !doctorName || !appointmentDate || !disease){
        alert("Please fill all fields");
        return;
    }

    await fetch(API_URL, {

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body: JSON.stringify({
            patientName,
            doctorName,
            appointmentDate,
            disease
        })

    });

    document.getElementById("patientName").value = "";
    document.getElementById("doctorName").value = "";
    document.getElementById("appointmentDate").value = "";
    document.getElementById("disease").value = "";

    loadAppointments();

}

/* DELETE APPOINTMENT */
async function deleteAppointment(id){

    await fetch(`${API_URL}/${id}`,{
        method:"DELETE"
    });

    loadAppointments();

}

loadAppointments();

</script>

</body>
</html>
